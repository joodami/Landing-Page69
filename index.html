<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเสนอเซ็นออนไลน์ - โรงเรียนพิมานพิทยาสรรค์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a5276;
            --accent-color: #3498db;
            --bg-color: #f0f4f8;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* Header Section */
        .school-logo {
            width: 80px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .system-title {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .school-name {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* Menu Buttons */
        .menu-grid {
            display: grid;
            gap: 20px;
        }

        .menu-item {
            background: white;
            padding: 25px 20px;
            border-radius: 24px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 2px solid transparent;
        }

        .menu-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 15px 30px rgba(26, 82, 118, 0.1);
        }

        .icon-box {
            width: 65px;
            height: 65px;
            background: #f1f5f9;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 1.8rem;
            color: var(--primary-color);
            transition: 0.3s;
        }

        .menu-item:hover .icon-box {
            background: var(--primary-color);
            color: white;
        }

        .menu-text {
            font-weight: 600;
            color: #1e293b;
            font-size: 1.1rem;
        }

        /* Footer */
        .app-footer {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="app-container">
    <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo" class="school-logo">
    
    <h1 class="system-title">ระบบเสนอเซ็นหนังสือราชการออนไลน์</h1>
    <p class="school-name">โรงเรียนพิมานพิทยาสรรค์</p>

    <div class="menu-grid">
        <a href="URL_หน้าเสนอเซ็น_ของครู" class="menu-item">
            <div class="icon-box">
                <i class="fas fa-pen-nib"></i>
            </div>
            <span class="menu-text">เสนอเซ็นหนังสือออนไลน์</span>
        </a>

        <a href="URL_หน้าติดตามสถานะ_ที่ทำเมื่อกี้" class="menu-item">
            <div class="icon-box">
                <i class="fas fa-search"></i>
            </div>
            <span class="menu-text">ติดตามสถานะหนังสือเสนอเซ็น</span>
        </a>
    </div>

    <div class="app-footer">
        งานสารบรรณ โรงเรียนพิมานพิทยาสรรค์<br>
        © 2026 Piman Pittayasarn School
    </div>
</div>

</body>
</html>
