<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piman Office App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #1a5276;
            --accent: #3498db;
            --bg-body: #f4f7f9;
        }

        body, html {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-body);
        }

        /* หน้าหลัก */
        #homePage {
            height: calc(100% - 70px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 15px;
        }

        /* พื้นที่ iframe */
        #contentFrame {
            width: 100%;
            height: calc(100% - 70px);
            border: none;
            display: none;
        }

        .app-header { text-align: center; margin-top: 10px; }
        .school-logo { width: 70px; margin-bottom: 10px; }
        .system-title { font-size: 1.3rem; font-weight: 600; color: var(--primary); margin: 0; }
        .school-name { font-size: 0.85rem; color: #64748b; }

        .menu-section { display: grid; gap: 15px; margin: 20px 0; }
        .menu-card {
            background: white; border-radius: 20px; padding: 15px;
            text-decoration: none !important; display: flex; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.2s;
            cursor: pointer; border: 1px solid rgba(0,0,0,0.03);
        }
        .menu-card:active { transform: scale(0.96); background: #f8f9fa; }

        .icon-box {
            width: 50px; height: 50px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: white; margin-right: 15px; flex-shrink: 0;
        }
        .icon-1 { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .icon-2 { background: linear-gradient(135deg, #3498db, #2980b9); }

        .menu-title { font-weight: 600; color: #334155; font-size: 1rem; display: block; text-align: left; }
        .menu-desc { font-size: 0.75rem; color: #94a3b8; display: block; text-align: left; }

        /* Bottom Navbar */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 70px; background: white;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.08);
            border-radius: 20px 20px 0 0; z-index: 1000;
        }
        .nav-item {
            text-decoration: none !important; color: #94a3b8;
            display: flex; flex-direction: column; align-items: center;
            font-size: 0.7rem; cursor: pointer; width: 33.33%;
        }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div id="homePage">
    <div class="app-header">
        <img src="https://raw.githubusercontent.com/joodami/school-assets/main/logo.png" alt="Logo" class="school-logo">
        <h1 class="system-title">Piman Digital Office</h1>
        <p class="school-name">โรงเรียนพิมานพิทยาสรรค์</p>
    </div>

    <div class="menu-section">
        <div onclick="openPage('https://docs.google.com/forms/d/e/1FAIpQLSewguRcJ9noZvMPJX1QdavSGV8Ib95WUeWVcIInTd0sPGieIA/viewform', 'form')" class="menu-card">
            <div class="icon-box icon-1"><i class="fas fa-file-signature"></i></div>
            <div class="text-content">
                <span class="menu-title">เสนอเซ็นออนไลน์ ปี 2569</span>
                <span class="menu-desc">เปิดฟอร์มในหน้าต่างใหม่เพื่อกรอกข้อมูล</span>
            </div>
            <i class="fas fa-external-link-alt ms-auto text-muted" style="font-size: 0.8rem;"></i>
        </div>

        <div onclick="openPage('https://joodami.github.io/track-status69/', 'app')" class="menu-card">
            <div class="icon-box icon-2"><i class="fas fa-tasks"></i></div>
            <div class="text-content">
                <span class="menu-title">ติดตามสถานะหนังสือ ปี 2569</span>
                <span class="menu-desc">ตรวจสอบคลังหนังสือผ่านหน้าแอป</span>
            </div>
            <i class="fas fa-chevron-right ms-auto text-muted" style="font-size: 0.8rem;"></i>
        </div>
    </div>

    <div class="text-center text-muted" style="font-size: 0.7rem; opacity: 0.6;">
        พัฒนาโดย งานสารบรรณโรงเรียน
    </div>
</div>

<iframe id="contentFrame" src=""></iframe>

<nav class="bottom-nav">
    <a onclick="goHome()" id="nav-home" class="nav-item active">
        <i class="fas fa-home"></i><span>หน้าหลัก</span>
    </a>
    <a onclick="openPage('https://docs.google.com/forms/d/e/1FAIpQLSewguRcJ9noZvMPJX1QdavSGV8Ib95WUeWVcIInTd0sPGieIA/viewform', 'form')" id="nav-edit" class="nav-item">
        <i class="fas fa-edit"></i><span>เสนอเซ็น</span>
    </a>
    <a onclick="openPage('https://joodami.github.io/track-status69/', 'app')" id="nav-search" class="nav-item">
        <i class="fas fa-search"></i><span>ติดตาม</span>
    </a>
</nav>

<script>
    const homePage = document.getElementById('homePage');
    const contentFrame = document.getElementById('contentFrame');
    const navHome = document.getElementById('nav-home');
    const navEdit = document.getElementById('nav-edit');
    const navSearch = document.getElementById('nav-search');

    function openPage(url, type) {
        if (type === 'form') {
            // กรณี Google Form ให้เปิดแท็บใหม่
            window.open(url, '_blank');
        } else {
            // กรณีหน้าติดตาม ให้แสดงใน iframe เหมือนเดิม
            homePage.style.display = 'none';
            contentFrame.style.display = 'block';
            contentFrame.src = url;
            
            clearActive();
            navSearch.classList.add('active');
        }
    }

    function goHome() {
        contentFrame.style.display = 'none';
        homePage.style.display = 'flex';
        contentFrame.src = "";
        clearActive();
        navHome.classList.add('active');
    }

    function clearActive() {
        navHome.classList.remove('active');
        navEdit.classList.remove('active');
        navSearch.classList.remove('active');
    }
</script>

</body>
</html>
